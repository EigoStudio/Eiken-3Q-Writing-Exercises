<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Do you like vegetables?</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ================= オンライン画面（iPad・電子黒板）用フォント ================= */
        body {
            font-family: "Chalkboard SE", "Comic Sans MS", "M PLUS Rounded 1c", sans-serif;
            background-color: #f4f7f6;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* タイトルエリア */
        header {
            text-align: center;
            margin-bottom: 15px;
        }
        h1 {
            margin: 0;
            font-size: 2.2em;
            color: #2c3e50;
        }
        .subtitle {
            font-size: 1.1em;
            color: #7f8c8d;
            margin-top: 5px;
            font-weight: normal;
            transition: all 0.3s ease;
        }
        .subtitle.highlight {
            color: #e74c3c;
            font-size: 1.4em;
            font-weight: bold;
        }

        /* メインコンテナ */
        .main-container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        /* 仕分け先コンテナ（最初は非表示） */
        .column {
            flex: 1;
            background: #eef2f5;
            border-radius: 15px;
            padding: 15px;
            display: none; 
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            border: 2px dashed #bdc3c7;
        }
        .column-title {
            text-align: center;
            font-size: 1.4em;
            font-weight: bold;
            padding: 5px;
            margin-bottom: 5px;
            border-radius: 10px;
        }
        #yes-column .column-title { color: #27ae60; background: #e8f8f5; }
        #no-column .column-title { color: #c0392b; background: #fadbd8; }

        /* 初期状態のカード置き場 */
        .quiz-section {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 12px 20px;
            align-content: start;
            overflow-y: auto;
        }

        /* カードのデザイン */
        .sentence-item {
            position: relative;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }

        .sentence-text {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        /* 日本語訳（初期状態は非表示） */
        .jp-text {
            display: none;
            font-size: 0.75em;
            color: #95a5a6;
            font-weight: normal;
            margin-top: 5px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* YES/NOボタン */
        .btn-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-group button {
            font-family: inherit;
            padding: 4px 14px;
            font-size: 0.85em;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            border: 2px solid #cbd5e1;
            background: white;
            color: #64748b;
            transition: all 0.2s;
        }

        .btn-yes:hover, .btn-yes.selected { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .btn-no:hover, .btn-no.selected { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        /* 判定バッジ */
        .badge {
            position: absolute;
            top: -10px;
            right: 10px;
            padding: 3px 10px;
            font-size: 0.8em;
            font-weight: bold;
            border-radius: 10px;
            color: white;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .badge.correct { background-color: #2ecc71; display: block; }
        .badge.wrong { background-color: #e74c3c; display: block; }

        @keyframes popUp {
            0% { transform: scale(0) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* フッターボタン */
        .footer-section {
            text-align: center;
            padding: 15px 0 5px 0;
        }

        .check-btn {
            font-family: inherit;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 50px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
            transition: all 0.2s;
        }
        .check-btn:hover { background-color: #2980b9; transform: translateY(-1px); }


        /* ================= 🖨️ 印刷専用スタイル（Command + P のみ） ================= */
        @media print {
            body { 
                background: white; 
                color: black; 
                padding: 0; 
                height: auto; 
                font-family: "Times New Roman", Times, "MS P明朝", serif; 
            }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .worksheet { border: 2px solid #000; padding: 40px; margin: 20px; }
            .ws-title { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 30px; letter-spacing: 1px; }
            .ws-info { display: flex; justify-content: space-between; margin-bottom: 40px; font-size: 16px; }
            .ws-question { font-size: 22px; font-weight: bold; margin-bottom: 20px; background: #f0f0f0; padding: 15px; border: 1px solid #000; }
            .ws-rule { font-size: 14px; margin-bottom: 40px; color: #333; font-family: "MS Pゴシック", sans-serif; }
            .line { border-bottom: 1px solid #000; height: 48px; margin-bottom: 5px; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>

    <div class="no-print" style="display: flex; flex-direction: column; height: 100%;">
        <header>
            <h1>Do you like vegetables?</h1>
            <div class="subtitle" id="sub-title">YES or NO? Choose the best column for each sentence, then click "Check Answers".</div>
        </header>
        
        <div class="main-container">
            <div class="quiz-section" id="quiz-container"></div>

            <div class="column" id="yes-column">
                <div class="column-title">I like vegetables.</div>
            </div>

            <div class="column" id="no-column">
                <div class="column-title">I don't like vegetables.</div>
            </div>
        </div>

        <div class="footer-section">
            <button class="check-btn" id="main-action-btn" onclick="checkAllAnswers()">Check Answers</button>
        </div>
    </div>


    <div class="print-only worksheet">
        <div class="ws-title">英検3級 ライティング・ワークシート</div>
        <div class="ws-info">
            <div>Name: ______________________</div>
            <div>Date: ____ / ____ / ____</div>
        </div>
        <div class="ws-question">QUESTION: Do you like vegetables?</div>
        <div class="ws-rule">【指示】あなたの意見とその理由を2つ書きなさい。語数の目安は25語〜35語です。</div>
        
        <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
    </div>

    <script>
        // 【修正】新しくご提案いただいた完璧な2つのセットに差し替え完了
        const sentences = [
            { text: "Vegetables are good for my health. I eat them to stay healthy.", jp: "野菜は健康に良いです。健康でいつづけるために野菜を食べます。", type: "yes" },
            { text: "They do not taste good.", jp: "野菜は美味しくないです。", type: "no" },
            { text: "There are many delicious vegetables.", jp: "おいしい野菜がたくさんあります。", type: "yes" },
            { text: "Some vegetables are bitter.", jp: "野菜のなかには苦いものもあります。", type: "no" },
            { text: "Vegetables are colorful, so I enjoy eating them.", jp: "野菜はカラフルです。だから野菜を食べるのは楽しいです。", type: "yes" },
            { text: "I do not like green vegetables.", jp: "私は緑色の野菜が好きではありません。", type: "no" },
            { text: "I eat tomatoes every day. They are my favorite food.", jp: "私は毎日トマトを食べます。トマトは私の大好物です。", type: "yes" },
            { text: "I like fruit better than vegetables.", jp: "私は野菜よりも果物の方が好きです。", type: "no" },
            { text: "Making a salad is very easy. You just cut them.", jp: "サラダを作ることはとても簡単です。野菜を切るだけです。", type: "yes" },
            { text: "I get a stomachache when I eat vegetables.", jp: "私は野菜を食べると、お腹が痛くなります。", type: "no" }
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[j], array[i]] = [array[i], array[j]];
            }
            return array;
        }

        const container = document.getElementById('quiz-container');
        const shuffled = shuffle([...sentences]);

        shuffled.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'sentence-item';
            div.id = `item-${index}`;
            div.dataset.correct = item.type;
            div.dataset.chosen = ""; 
            
            div.innerHTML = `
                <div class="badge" id="badge-${index}"></div>
                <div>
                    <div class="sentence-text">${item.text}</div>
                    <div class="jp-text" id="jp-${index}">${item.jp}</div>
                </div>
                <div class="btn-group">
                    <button class="btn-yes" onclick="selectAnswer(${index}, 'yes')">YES</button>
                    <button class="btn-no" onclick="selectAnswer(${index}, 'no')">NO</button>
                </div>
            `;
            container.appendChild(div);
        });

        function selectAnswer(index, type) {
            const item = document.getElementById(`item-${index}`);
            item.dataset.chosen = type;
            const btnYes = item.querySelector('.btn-yes');
            const btnNo = item.querySelector('.btn-no');
            btnYes.classList.remove('selected');
            btnNo.classList.remove('selected');
            if (type === 'yes') btnYes.classList.add('selected');
            if (type === 'no') btnNo.classList.add('selected');
        }

        function checkAllAnswers() {
            let allAnswered = true;
            let hasWrong = false;
            
            shuffled.forEach((_, index) => {
                const item = document.getElementById(`item-${index}`);
                if (!item.dataset.chosen) allAnswered = false;
            });
            
            if (!allAnswered) {
                alert("Please answer all questions first!");
                return;
            }

            shuffled.forEach((_, index) => {
                const item = document.getElementById(`item-${index}`);
                const badge = document.getElementById(`badge-${index}`);
                const chosen = item.dataset.chosen;
                const correct = item.dataset.correct;
                badge.className = 'badge'; 
                
                if (chosen === correct) {
                    badge.innerText = "Good! ◯";
                    badge.classList.add('correct');
                } else {
                    badge.innerText = "Oops! ✕";
                    badge.classList.add('wrong');
                    hasWrong = true;
                }
            });

            if (!hasWrong) {
                setTimeout(() => {
                    container.style.display = 'none';
                    document.getElementById('yes-column').style.display = 'flex';
                    document.getElementById('no-column').style.display = 'flex';
                    
                    shuffled.forEach((_, index) => {
                        const item = document.getElementById(`item-${index}`);
                        const correct = item.dataset.correct;
                        const jpText = document.getElementById(`jp-${index}`);
                        
                        item.querySelector('.btn-group').style.display = 'none';
                        item.querySelector('.badge').style.display = 'none';
                        jpText.style.display = 'block';
                        
                        if (correct === 'yes') {
                            document.getElementById('yes-column').appendChild(item);
                        } else {
                            document.getElementById('no-column').appendChild(item);
                        }
                    });
                    
                    const subTitle = document.getElementById('sub-title');
                    subTitle.innerText = "🎉 All correct! Now, write your essay!";
                    subTitle.classList.add('highlight'); 
                    
                    document.getElementById('main-action-btn').style.display = 'none';
                }, 1000); 
            }
        }
    </script>
</body>
</html>
